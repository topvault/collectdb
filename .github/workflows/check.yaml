name: Check

permissions:
  contents: write

on:
  pull_request:
    paths:
      - '.editorconfig'
      - '.github/workflows/**'
      - '.prettierrc.yaml'
      - 'data/**/*.yaml'
      - 'package-lock.json'
      - 'package.json'
      - 'schema/**/*.ts'
      - 'scripts/**/*.ts'
      - 'tsconfig.json'
  push:
    branches:
      - main
    paths:
      - '.editorconfig'
      - '.github/workflows/**'
      - '.prettierrc.yaml'
      - 'data/**/*.yaml'
      - 'package-lock.json'
      - 'package.json'
      - 'schema/**/*.ts'
      - 'scripts/**/*.ts'
      - 'tsconfig.json'

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check YAML formatting
        run: npm run format:check

  snag:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check generated IDs
        run: |
          for collectible_type_path in data/*; do
            if [ ! -d "$collectible_type_path" ]; then
              continue
            fi

            collectible_type="$(basename "$collectible_type_path")"

            for region_path in "$collectible_type_path"/*; do
              if [ ! -d "$region_path" ]; then
                continue
              fi

              region="$(basename "$region_path")"
              npm run snag -- --check "$collectible_type" "$region"
            done
          done

  reference-of:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check reference normalization
        run: |
          for collectible_type_path in data/*; do
            if [ ! -d "$collectible_type_path" ]; then
              continue
            fi

            collectible_type="$(basename "$collectible_type_path")"

            for region_path in "$collectible_type_path"/*; do
              if [ ! -d "$region_path" ]; then
                continue
              fi

              region="$(basename "$region_path")"
              npm run reference-of -- --check "$collectible_type" "$region"
            done
          done

  validate-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate data
        run: npm run validate:data

  sync-sheets:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - prettier
      - snag
      - reference-of
      - validate-data
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SHEETS_PARENT_FOLDER_ID: ${{ secrets.GOOGLE_SHEETS_PARENT_FOLDER_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sheets Sync
        if: env.GOOGLE_SERVICE_ACCOUNT_JSON != ''
        run: npm run sheets-sync -- --create-missing

      - name: Commit sheets sync registry updates
        if: env.GOOGLE_SERVICE_ACCOUNT_JSON != ''
        run: |
          if git diff --quiet -- README.md .sheets.yaml; then
            exit 0
          fi

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md .sheets.yaml
          git commit -m "chore: update Sheets sync registry"
          git push