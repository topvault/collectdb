name: Pokémon Cards
support: full
releaseDate: '1996-10-20'
regions:
  - english
  - japanese
remarks:
  # Pre-press (digital blueprint) faults.
  error-design:
    name: Design Error
    description: 'Pre-press blueprint defect hardcoded into the run: wrong layout or image, or wrong text such as HP, stage, Pokédex number, or copyright.'
  # Plate & ink (on-press) faults.
  error-print-obstruction:
    name: Recurring Obstruction
    description: Debris, hair, or dried ink on a plate creating a recurring ink void, stain, or hickey across the run (cigar, highlighter, dot).
  error-print-mechanical:
    name: Mechanical Print Error
    description: Plate physically damaged or the press slipping, such as a plate scratch or gouge stamping a recurring mark, or a doubled impression from press shudder.
  error-ink-starvation:
    name: Recurring Ink Starvation
    description: An ink fountain or feed line running low, leaving faded, washed-out, or miscolored print (low black/yellow ink, gray print).
  error-ink-additional:
    name: Additional Ink Error
    description: Other ink-layer fault not covered by starvation, such as a shifted or mis-trapped white underprint mask (holoshift, holo bleed) or stray ink coverage.
  # Foil substrate & lamination faults.
  error-foil-fault:
    name: Foil / Lamination Error
    description: Foil stock or lamination fault such as a wrong foil substrate swap, a pre-ink shift leaving a raw edge, or lamination tunnelling.
  # Final coats, stamping, and texture faults.
  error-finishing-pass:
    name: Finishing Error
    description: Finishing-pass fault such as a gloss or varnish coat anomaly, a hot-stamp die failure, or a CNC texture/engraving fault.
  # Macro sheet handling & cutting faults.
  error-sheet-handling:
    name: Sheet Handling Error
    description: Macro sheet handling or cutting fault such as misalignment, a missing set symbol, a fold-over, or a miscut.
  # Packaging faults.
  error-packaging:
    name: Packaging Error
    description: Booster-pack assembly damage such as a factory crimp embedding a grid into the border, or wrapper folds and tears.
  # Pre-production / non-retail artifacts.
  test-print:
    name: Test Print
    description: Test print or test sheet released ahead of or outside the normal production run.
  test-proof:
    name: Test Proof
    description: Proof card such as a Victory Proof.
  test-sample:
    name: Sample
    description: Production sample or sample set.
  # Promotional distribution.
  promo-prerelease:
    name: Promo Prerelease
    description: Prerelease or staff-stamped promotional distribution.
