items:
  sudowoodo:
    name: Sudowoodo
    index: '001'
    editions:
      - unlimited
    variant:
      name: Non-holo
      description: >-
        This is a non-holographic variant. If a variant isn't holographic, has no other specific defining
        characteristics, and isn't part of the standard set (*Normal*/*Normal Holo*) or the parallel set (e.g., *Reverse
        Holo*), *Non-holo* is used as the default variant.
    integrations:
      tcgCollector: cards/41099/sudowoodo-neo-premium-file-3-no-001
