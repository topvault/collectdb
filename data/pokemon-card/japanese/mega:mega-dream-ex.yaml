    index: '001'
    editions:
      - unlimited
    variants:
      energy-reverse-holo:
        name: Energy Reverse Holo
        description: >-
          The standard set (*Normal* or *Normal Holo* variant) often has a complementary set called the *parallel set*.
          This parallel set is shown as the second column on official checklists.
                                                                                                                                                                            
          *Energy Reverse Holo* is a parallel set variant that features a reverse holographic pattern that consists of
          Energy symbols.
