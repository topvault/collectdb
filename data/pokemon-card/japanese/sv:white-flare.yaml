    index: '001'
    details:
      rarity: Common
    editions:
      - unlimited
    variants:
      master-ball-reverse-holo:
        name: Master Ball Reverse Holo
        description: >-
          The standard set (*Normal* or *Normal Holo* variant) often has a complementary set called the *parallel set*.
          This parallel set is shown as the second column on official checklists.


          *Master Ball Reverse Holo* is a parallel set variant that features a reverse holographic pattern that consists
