      unlimited: b750fc62-1495-4107-960d-2c27284de3a5
    variant:
      name: Non-holo
      description: >-
        This is a non-holographic variant. If a variant isn't holographic, has
        no other specific defining characteristics, and isn't part of the
        standard set (*Normal*/*Normal Holo*) or the parallel set (e.g.,
        *Reverse Holo*), *Non-holo* is used as the default variant.
