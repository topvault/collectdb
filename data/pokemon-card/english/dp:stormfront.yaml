items:
  dusknoir-1:
    name: Dusknoir
    details:
      illustrator: Mitsuhiro Arita
      rarity: Rare Holo
      category: Pokemon
      dexId:
        - '477'
      hp: '120'
      types:
        - Psychic
      evolveFrom: Dusclops
      level: undefined
      stage: Stage2
      abilities:
        - type: Poke-POWER
          name: Shadow Command
          effect: >-
            Once during your turn (before your attack), you may draw 2 cards. If
            you have 7 or more cards in your hand, discard a number of cards
            until you have 6 cards in your hand. Then, put 2 damage counters on
            Dusknoir. This power can't be used if Dusknoir is affected by a
            Special Condition.
      attacks:
        - name: Damage Even
          cost:
            - Psychic
            - Colorless
          damage: undefined
          effect: >-
            Count the number of damage counters on Dusknoir. Put that many
            damage counters on 1 of your opponent's Pokémon.
        - name: Night Spin
          cost:
            - Psychic
            - Psychic
            - Colorless
          damage: '50'
          effect: >-
            Prevent all effects of an attack, including damage, done to Dusknoir
            by your opponent's Pokémon that has 2 or less Energy attached to it
            during your opponent's next turn.
      weaknesses:
        - type: Darkness
          value: '+30'
      resistances:
        - type: Colorless
          value: '-20'
      retreat: '3'
    editions:
      unlimited: a7d1950f-b8cd-458c-97d1-2a93de3171e2
      reverse-holo: fd80f0f7-fd79-46ea-9cbe-8cf975000337
    integrations:
      pokeData: '7888'
      tcgPlayer: '85037'
