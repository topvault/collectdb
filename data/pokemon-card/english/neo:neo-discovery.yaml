          damage: '20'
        - name: Psychic
          cost:
            - Psychic
            - Psychic
            - Colorless
          damage: 30+
          effect: >-
            Does 30 damage plus 10 more for each Energy Card attached to the
            Defending Pokémon.
      weaknesses:
        - type: Psychic
          value: ×2
      retreat: undefined
    editions:
      1st-edition: 2facf8b0-74cc-4e95-a3f0-196d597b21ca
      unlimited: d5499af2-e7a4-44ff-bfac-ac798bec9a9f
  forretress-2:
    name: Forretress
    details:
      illustrator: CR CG gangs
      rarity: Rare
      category: Pokemon
      dexId:
        - '205'
      hp: '80'
      types:
        - Metal
      evolveFrom: Pineco
      level: undefined
      stage: Stage1
      abilities:
        - type: Pokemon Power
          name: Spikes
          effect: >-
            During your opponent's turn, whenever 1 of your opponent's Benched
            Pokémon becomes his or her Active Pokémon, Forretress does 10 damage
            to it. (Don't apply Weakness and Resistance.) This power stops
            working if Forretress is Asleep, Confused, or Paralyzed.
      attacks:
        - name: Rapid Spin
          cost:
            - Metal
            - Colorless
            - Colorless
          damage: '30'
          effect: >-
            If your opponent has any Benched Pokémon, he or she chooses 1 of
            them and switches it with their Active Pokémon; then, if you have
            any Benched Pokémon, you switch 1 of them with your Active Pokémon.
            (Do the damage before switching the Pokémon.)
      weaknesses:
        - type: Fire
          value: ×2
      resistances:
        - type: Grass
          value: '-30'
      retreat: undefined
    editions:
      1st-edition: 6ba4888a-8316-4c11-8583-7f2c6f554c26
      unlimited: 29da1df4-0d61-4cbf-86ad-23d39ea21ff2
