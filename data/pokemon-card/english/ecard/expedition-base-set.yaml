        description: >-
          These cards have a hole punched in the top center of the card and a
          glossy finish on the back. They were used in retail stores to test the
          new e-Reader. There is an alternate version of this card with the hole
          punched and a matte back.

          Note that these hole-punched cards are different from the E3 test
          print cards.
