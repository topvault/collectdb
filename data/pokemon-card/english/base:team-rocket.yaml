          damage: 50x
          effect: >-
            Flip a number of coins equal to the number of Energy cards attached
            to Dark Charizard. This attack does 50 damage times the number of
            heads. Discard a number of Energy cards attached to Dark Charizard
            equal to the number of heads.
      weaknesses:
        - type: Water
          value: ×2
      resistances:
        - type: Fighting
          value: '-30'
      retreat: '3'
    editions:
      1st-edition: 61a15143-f605-4d2d-94ce-42a7e261e3a8
      unlimited: d2ab0b27-52f5-430b-94d7-11c46d19a26a
  dark-dragonite-5:
    name: Dark Dragonite
    variants:
      non-holo-error:
        name: 'Non-Holo 1st Edition #5 Error'
        description: >-
          A non-holo version with the card number 5 (it should say 22/82).

          Mistakenly printed within an uncommons card sheet print run for Team
          Rocket. Received in Team Rocket (peg hanger) packs, and reportedly
          short seal as well. Produced in both 1st edition and unlimited print.
          The first edition print is moderately more rare.
        edition: 1st-edition
        rarityScore: 7
        integrations:
          priceCharting:
            non-holo-error: dark-dragonite-1st-edition-error-5
        id: 893f7d91-1a1d-412e-9e0d-46fa229c235d
      non-holo-unlimited-error:
        name: 'Non-Holo Unlimited Edition #5 Error'
        description: >-
          A non-holo version with the card number 5 (it should say 22/82).

          Mistakenly printed within an uncommons card sheet print run for Team
          Rocket. Received in Team Rocket (peg hanger) packs, and reportedly
          short seal as well. Produced in both 1st edition and unlimited print.
          The first edition print is moderately more rare.
        edition: unlimited
        rarityScore: 6
        integrations:
          priceCharting:
            non-holo-unlimited-error: dark-dragonite-error-5
        id: 5e3b1b9b-dc89-48e0-b432-0c88bd1d3f25
    details:
      illustrator: Mitsuhiro Arita
      rarity: Rare
      category: Pokemon
      dexId:
        - '149'
      hp: '70'
      types:
        - Colorless
      evolveFrom: Dragonair
      level: undefined
      stage: Stage2
      abilities:
        - type: Pokemon Power
          name: Summon Minions
          effect: >-
            When you play Dark Dragonite from your hand, search your deck for up
            to 2 Basic Pokémon and put them onto your Bench. Shuffle your deck
            afterward.
      attacks:
        - name: Giant Tail
          cost:
            - Colorless
            - Colorless
            - Colorless
            - Colorless
          damage: '70'
          effect: Flip a coin. If tails, this attack does nothing.
