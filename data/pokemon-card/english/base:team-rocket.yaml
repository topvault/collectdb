          Mistakenly printed within an uncommons card sheet print run for Team
          Rocket. Received in Team Rocket (peg hanger) packs, and reportedly
          short seal as well. Produced in both 1st edition and unlimited print.
          The first edition print is moderately more rare.
        edition: 1st-edition
