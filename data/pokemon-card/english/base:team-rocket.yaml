        name: Wizards (W) Stamp (Silver)
        description: >-
          Wizards W stamp using silver foil.

          This card was given away as part of a Kraft Foods Giveaway in
          Australia.  The "gold foil" variant is much rarer and the silver foil
          version is not recognized by authenticators. It is suspected that the
          silver foil version was an end-of-run replacement. The silver foil
          versions have been found in sealed packaging.
        links:
          'eFour discussion': 'https://www.elitefourum.com/t/struck-the-mother-lode-of-silver-w-stamp-dark-charmeleon-kraft-promo-cards/56969'
