items:
  dark-alakazam-1:
    name: Dark Alakazam
    details:
      illustrator: Ken Sugimori
      rarity: Rare
      category: Pokemon
      dexId:
        - '65'
      hp: '60'
      types:
        - Psychic
      evolveFrom: Kadabra
      level: undefined
      stage: Stage2
      attacks:
        - name: Teleport Blast
          cost:
            - Psychic
            - Psychic
            - Colorless
          damage: '30'
          effect: >-
            You may switch Dark Alakazam with 1 of your Benched Pokémon (Do the
            damage before switching the Pokémon).
        - name: Mind Shock
          cost:
            - Psychic
            - Psychic
            - Psychic
          damage: '40'
          effect: >-
            Don't apply Weakness and Resistance for this attack. (Any other
            effects that would happen after applying Weakness and Resistance
            still happen.)
      weaknesses:
        - type: Psychic
          value: ×2
      retreat: undefined
    editions:
      1st-edition: 79d51451-73d4-4657-a85b-6434ae1e017a
      unlimited: 1e6a62da-4fa5-4dc1-8e0c-e415c46c1846
  dark-arbok-2:
    name: Dark Arbok
    details:
      illustrator: Mitsuhiro Arita
      rarity: Rare
      category: Pokemon
      dexId:
        - '24'
      hp: '60'
      types:
        - Grass
      evolveFrom: Ekans
      level: undefined
      stage: Stage1
      attacks:
        - name: Stare
          cost:
            - Grass
            - Grass
          damage: undefined
          effect: >-
            Choose 1 of your opponent's Pokémon. This attack does 10 damage to
            that Pokémon. Don't apply Weakness and Resistance for this attack.
            (Any other effects that would happen after applying Weakness and
            Resistance still happen.) If that Pokémon has a Pokémon Power, that
            power stops working until the end of your opponent's next turn.
        - name: Poison Vapor
          cost:
            - Grass
            - Grass
            - Grass
          damage: '10'
          effect: >-
            The Defending Pokémon is now Poisoned. This attack does 10 damage to
            each of your opponent's Benched Pokémon. (Don't apply Weakness and
            Resistance for Benched Pokémon.)
      weaknesses:
        - type: Psychic
          value: ×2
      retreat: undefined
    editions:
      1st-edition: c2c19263-4ac9-489e-a765-e453661ce684
      unlimited: 6dfa44f2-5cf4-441b-a998-a81e8adf10b0
  dark-blastoise-3:
    name: Dark Blastoise
    details:
      illustrator: Mitsuhiro Arita
      rarity: Rare
      category: Pokemon
      dexId:
        - '9'
      hp: '70'
      types:
        - Water
      evolveFrom: Wartortle
      level: undefined
      stage: Stage2
      attacks:
        - name: Hydrocannon
          cost:
            - Water
            - Water
          damage: 30+
          effect: >-
            Does 30 damage plus 20 more damage for each W Energy attached to
            Dark Blastoise but not used to pay for this attack. You can't add
            more than 40 damage in this way.
        - name: Rocket Tackle
          cost:
            - Water
            - Colorless
            - Colorless
          damage: '40'
          effect: >-
            Dark Blastoise does 10 damage to itself. Flip a coin. If heads,
            prevent all damage done to Dark Blastoise during your opponent's
            next turn. (Any other effects of attacks still happen.)
      weaknesses:
        - type: Lightning
          value: ×2
      retreat: undefined
    editions:
      1st-edition: 69be04e7-1109-40a2-8047-62da95569f18
