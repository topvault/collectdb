products:
  booster-pack-flareon:
    name: Booster Pack [Flareon]
    integrations:
      priceCharting: booster-pack
    variant:
      name: Thick Font
      description: >-
        Early unlimited edition booster packs had a thicker yellow font for "11 Additional Game Cards".
        The Jungle symbol has a slight yellow glow, and the Pokemon logo uses a black "TM*".
      edition: unlimited
    variants:
      thin-font-asterisk:
        name: Thin Font (Asterisk)
        edition: unlimited
        description: >-
          Later print runs of the unlimited edition booster packs had a thinner yellow font for "11 Additional Game Cards".
          The Jungle symbol has no yellow glow, and the Pokemon logo uses a white "TM*".
        id: 5fa1a09c-df77-4550-a627-80cccda05566
      thin-font:
        name: Thin Font
        edition: unlimited
        description: >-
          Later print runs of the unlimited edition booster packs had a thinner yellow font for "11 Additional Game Cards".
          The Jungle symbol has no yellow glow, and the Pokemon logo uses a white "TM" without an asterisk.
        id: 3f17cf62-f38a-43e7-b9df-cb14d145dca3
      2000-usa:
        name: 2000-USA Reprint
        edition: unlimited
        description: >-
          A reprint of the Jungle booster pack released with a 1999-2000 copyright on the pack.
