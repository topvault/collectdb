items:
  clefable-1:
    name: Clefable
    variants:
      prerelease:
        name: Prerelease
        description: >-
          Distributed as part of the Pokemon League tournaments related to the upcoming expansion release.

          It was first rumored that four versions of this Prerelease promotional card exist (with the stamp having one of four different color variations: green, red, gold, and blue),
          though this has since been confirmed to be false.
          Only the green stamped variant was publicly released.
        id: ce466cc8-9b68-46c3-9227-d6368c546bb9
    details:
      illustrator: Mitsuhiro Arita
      rarity: Rare
      category: Pokemon
      dexId:
        - '36'
      hp: '70'
      types:
        - Colorless
      evolveFrom: Clefairy
      level: undefined
      stage: Stage1
      attacks:
        - name: Metronome
          cost:
            - Colorless
          damage: undefined
          effect: >-
            Choose 1 of the Defending Pokémon's attacks. Metronome copies that
            attack except for its Energy costs and anything else required in
            order to use that attack, such as discarding Energy cards. (No
            matter what type the Defending Pokémon is, Clefable's type is still
            Colorless.)
        - name: Minimize
          cost:
            - Colorless
            - Colorless
          damage: undefined
          effect: >-
            All damage done by attacks to Clefable during your opponent's next
            turn is reduce by 20 (after applying Weakness and Resistance).
      weaknesses:
        - type: Fighting
          value: ×2
      resistances:
        - type: Psychic
          value: '-30'
      retreat: undefined
    editions:
      1st-edition: 7f07a2af-72e8-4994-a9dc-e94ef561b82a
      unlimited: dc76520b-f024-4161-8330-e1e0f81fa08a
