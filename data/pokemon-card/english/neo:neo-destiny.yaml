items:
  dark-ampharos-1:
    name: Dark Ampharos
    details:
      illustrator: Kagemaru Himeno
      rarity: Rare
      category: Pokemon
      dexId:
        - '181'
      hp: '70'
      types:
        - Lightning
      evolveFrom: Flaaffy
      level: undefined
      stage: Stage2
      abilities:
        - type: Pokemon Power
          name: Conductivity
          effect: >-
            Whenever your opponent attaches an Energy card to a Pokémon from his
            or her hand, this Power does 10 damage to that Pokémon. (Don't apply
            Weakness and Resistance) This power stops working if you have more
            than 1 Dark Ampharos in play or while Dark Ampharos is Asleep,
            Confused or Paralysed.
      attacks:
        - name: Shock Bolt
          cost:
            - Lightning
            - Colorless
            - Colorless
          damage: '50'
          effect: >-
            Discard all Energy cards attached to this Pokémon in order to use
            this attack.
      weaknesses:
        - type: Fighting
          value: ×2
      retreat: undefined
    editions:
      1st-edition: 3818cef2-f397-42e2-8a22-886b18b89f35
      unlimited: 863bc7e0-b809-4fa6-9b54-24faf91a5bb8
