items:
  caterpie-1:
    name: Caterpie
    details:
      illustrator: Sekio
      rarity: None
      category: Pokemon
      hp: '50'
      types:
        - Grass
      description: >-
        When attacked by bird Pokémon, it resists by releasing a terrifically
        strong odor from its antennae, but it often becomes their prey.
      level: undefined
      stage: Basic
      attacks:
        - name: Surprise Attack
          damage: '20'
          effect: Flip a coin. If tails, this attack does nothing.
      retreat: undefined
    editions:
      unlimited: 0a746c5e-38c1-48fb-8588-04deac05c61f
  alolan-exeggutor-2:
    name: Alolan Exeggutor
    details:
      illustrator: Satoshi Shirai
      rarity: None
      category: Pokemon
      hp: '160'
      types:
        - Grass
      description: >-
        As it grew taller and taller, it outgrew its reliance on psychic powers,
        while within it awakened the power of the sleeping dragon.
      level: undefined
      stage: Stage1
      attacks:
        - name: Tropical Shake
          damage: 20+
          effect: >-
            This attack does 20 more damage for each type of basic Energy card
            in your discard pile. You can’t add more than 100 damage in this
            way.
      retreat: undefined
    editions:
      unlimited: e82c7141-2a4f-45e2-8847-57d3f12d1275
  magmar-3:
    name: Magmar
    details:
      illustrator: Yumi
      rarity: None
      category: Pokemon
      hp: '80'
      types:
        - Fire
      description: >-
        When angered, it spouts brilliant fire from all over its body. It
        doesn’t calm down until its opponent has burned to ash.
      level: undefined
      stage: Basic
      attacks:
        - name: Controlled Burn
          damage: undefined
          effect: Discard the top card of your opponent’s deck.
        - name: Flamethrower
          damage: '80'
          effect: Discard an Energy from this Pokémon.
      retreat: undefined
    editions:
      unlimited: bd8cb18a-d9c3-4ac0-aff1-3df1c45af23a
  alolan-sandshrew-4:
    name: Alolan Sandshrew
    details:
      illustrator: Shin Nagasawa
      rarity: None
      category: Pokemon
      hp: '60'
      types:
        - Water
      description: >-
        An ancient tradition of Alolan festivals, still carried on to this day,
        is a competition to slide Sandshrew across ice as far as one can.
      level: undefined
      stage: Basic
      attacks:
        - name: Fury Swipes
          damage: 10×
          effect: Flip 3 coins. This attack does 10 damage for each heads.
      retreat: undefined
    editions:
      unlimited: bc74af3d-d658-42c9-912c-26420ccef6f4
  lapras-5:
    name: Lapras
    details:
      illustrator: Saya Tsuruta
      rarity: None
      category: Pokemon
      hp: '120'
      types:
        - Water
      description: >-
        These Pokémon were once near extinction due to poaching. Following
        protective regulations, there is now an overabundance of them.
      level: undefined
      stage: Basic
      attacks:
        - name: Aqua Bullet
          damage: '20'
          effect: >-
            This attack does 20 damage to 1 of your opponent’s Benched Pokémon.
            (Don’t apply Weakness and Resistance for Benched Pokémon.)
        - name: Hydro Pump
          damage: 70+
          effect: >-
            This attack does 10 more damage times the amount of Water Energy
            attached to this Pokémon.
      retreat: undefined
    editions:
      unlimited: 69693730-25bd-4727-9f3d-efd92b84f55f
  pikachu-6:
    name: Pikachu
    details:
      illustrator: Kagemaru Himeno
      rarity: None
      category: Pokemon
      hp: '60'
      types:
        - Lightning
      description: >-
        A plan was recently announced to gather many Pikachu and make an
        electric power plant.
      level: undefined
      stage: Basic
      attacks:
        - name: Iron Tail
          damage: 20×
          effect: >-
            Flip a coin until you get tails. This attack does 20 damage for each
            heads.
      retreat: undefined
    editions:
      unlimited: 0f7e4b4d-6d72-4f4e-b117-70b2794121bb
  gastly-7:
    name: Gastly
    details:
      illustrator: Shibuzoh.
      rarity: None
      category: Pokemon
      hp: '50'
      types:
        - Psychic
      description: >-
        Should a strange light be seen flickering in an abandoned building,
        Gastly is lurking there.
      level: undefined
      stage: Basic
      attacks:
        - name: Ominous Eyes
          damage: undefined
          effect: Put 1 damage counter on 1 of your opponent’s Pokémon.
      retreat: undefined
    editions:
      unlimited: 0335b01e-ddd7-46b7-be4b-b007c950ac26
  mankey-8:
    name: Mankey
    details:
      illustrator: Miki Tanaka
      rarity: None
      category: Pokemon
      hp: '50'
      types:
        - Fighting
      description: >-
        It can spontaneously become enraged. Everyone near it clears out as it
        rampages and the resulting loneliness makes it angrier still.
      level: undefined
      stage: Basic
      attacks:
        - name: Three-Step Strike
          damage: 10×
          effect: Flip 3 coins. This attack does 10 damage for each heads.
      retreat: undefined
    editions:
      unlimited: f3918968-f82e-48be-a171-f868e22c55fe
  onix-9:
    name: Onix
    details:
      illustrator: Mitsuhiro Arita
      rarity: None
      category: Pokemon
      hp: '100'
      types:
        - Fighting
      description: >-
        It usually lives underground. It searches for food while boring its way
        through the ground at 50 miles per hour.
      level: undefined
      stage: Basic
      attacks:
        - name: Screech
          damage: undefined
          effect: >-
            During your next turn, the Defending Pokémon takes 20 more damage
            from attacks (after applying Weakness and Resistance).
        - name: Rage
          damage: 10+
          effect: >-
            This attack does 10 more damage for each damage counter on this
            Pokémon.
      retreat: undefined
    editions:
      unlimited: a2ed2ac2-3c56-4059-92a0-6eaea8d8a9db
  alolan-meowth-10:
    name: Alolan Meowth
    details:
      illustrator: Akira Komayama
      rarity: None
      category: Pokemon
      hp: '60'
      types:
        - Darkness
      description: >-
        When its delicate pride is wounded, or when the gold coin on its
        forehead is dirtied, it flies into a hysterical rage.
      level: undefined
      stage: Basic
      attacks:
        - name: Spoil the Fun
          damage: 10+
          effect: >-
            If you go second, this attack does 60 more damage during your first
            turn.
      retreat: undefined
    editions:
      unlimited: e5e5e0f0-29ff-4b14-b759-488b7a606e83
  alolan-dugtrio-11:
    name: Alolan Dugtrio
    details:
      illustrator: Megumi Mizutani
      rarity: None
      category: Pokemon
      hp: '60'
      types:
        - Metal
      description: >-
        These Pokémon are cherished in the Alola region, where they are thought
        to be feminine deities of the land incarnate.
      level: undefined
      stage: Stage1
      attacks:
        - name: Gold Rush
          damage: 30×
          effect: >-
            Discard any number of Metal Energy cards from your hand. This attack
            does 30 damage for each card you discarded in this way.
      retreat: undefined
    editions:
      unlimited: 05583fff-026e-4047-990f-14921214ef80
  eevee-12:
    name: Eevee
    details:
      illustrator: Atsuko Nishida
      rarity: None
      category: Pokemon
      hp: '60'
      types:
        - Colorless
      description: >-
        Current studies show it can evolve into an incredible eight different
        species of Pokémon.
      level: undefined
      stage: Basic
      attacks:
        - name: Gnaw
          damage: '20'
      retreat: undefined
    editions:
      unlimited: a872acd9-922f-4d0b-a6c1-6851c25d472a
