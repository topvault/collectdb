items:
  beedrill-1:
    name: Beedrill δ
    details:
      illustrator: Masakazu Fukuda
      rarity: Rare
      category: Pokemon
      dexId:
        - '15'
      hp: '90'
      types:
        - Grass
        - Metal
      evolveFrom: Kakuna
      level: undefined
      stage: Stage2
      abilities:
        - type: Poke-POWER
          name: Final Sting
          effect: >-
            Once during your turn (before your attack), you may Knock Out
            Beedrill. If you do, choose 1 of your opponent's Defending Pokémon.
            That Pokémon is now Paralyzed and Poisoned. Put 2 damage counters
            instead of 1 on that Pokémon between turns. This power can't be used
            if Beedrill is affected by a Special Condition.
      attacks:
        - name: Super Slash
          cost:
            - Colorless
            - Grass
            - Metal
          damage: 50+
          effect: >-
            If the Defending Pokémon is an Evolved Pokémon, this attack does 50
            damage plus 30 more damage.
      weaknesses:
        - type: Fire
          value: ×2
      retreat: undefined
