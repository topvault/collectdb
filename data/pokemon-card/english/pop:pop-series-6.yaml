      illustrator: Kazuyuki Kano
      rarity: Rare
      category: Pokemon
      dexId:
        - '411'
      hp: '130'
      types:
        - Metal
      evolveFrom: Shieldon
      description: >-
        Any frontal attack is repulsed. It is a docile Pokémon that feeds on
        grass and berries.
      level: undefined
      stage: Stage2
      abilities:
        - type: Poke-BODY
          name: Protective Wall
          effect: >-
            Prevent all damage done to your Benched Pokémon by your opponent’s
            attacks.
      attacks:
        - name: Anger Revenge
          cost:
            - Metal
            - Metal
            - Colorless
          damage: '60'
          effect: >-
            If Bastiodon was damaged by an attack during your opponent’s last
            turn, this attack does 40 damage to 1 of your opponent’s Benched
            Pokémon. (Don’t apply Weakness and Resistance for Benched Pokémon.)
      weaknesses:
        - type: Fire
          value: '+40'
      resistances:
        - type: Psychic
          value: '-20'
      retreat: '3'
