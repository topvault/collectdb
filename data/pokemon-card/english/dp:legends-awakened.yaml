      dexId:
        - '386'
      hp: '90'
      types:
        - Psychic
      level: undefined
      stage: Basic
      abilities:
        - type: Poke-POWER
          name: Form Change
          effect: >-
            Once during your turn (before your attack), you may search your deck
            for any Deoxys and switch it with Deoxys Normal Forme. (Any cards
            attached to Deoxys Normal Forme, damage counters, Special
            Conditions, and effects on it are now on the new Pokémon.) If you
            do, put Deoxys Normal Forme on top of your deck. Shuffle your deck
            afterward. You can't use more than 1 Form Change Poké-Power each
            turn.
      attacks:
        - name: Energy Crush
          cost:
            - Psychic
            - Colorless
          damage: 20+
          effect: >-
            Does 20 damage plus 10 more damage for each Energy attached to all
            of your opponent's Pokémon.
      weaknesses:
        - type: Psychic
          value: ×2
      retreat: '1'
