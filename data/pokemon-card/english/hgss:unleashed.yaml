items:
  jirachi-1:
    name: Jirachi
    details:
      illustrator: Wataru Kawahara
      rarity: Rare Holo
      category: Pokemon
      dexId:
        - '385'
      hp: '60'
      types:
        - Psychic
      description: >-
        Generations have believed that any wish written on a note on its head
        will come true when it awakens.
      level: undefined
      stage: Basic
      abilities:
        - type: Poke-POWER
          name: Stardust Song
          effect: >-
            Once during your turn, when you put Jirachi from your hand onto your
            Bench, you may flip 3 coins. For each heads, search your discard
            pile for a Psychic Energy card and attach it to Jirachi.
      attacks:
        - name: Time Hollow
          cost:
            - Psychic
          damage: undefined
          effect: >-
            Choose a number of your opponent’s Stage 1 or Stage 2 Evolved
            Pokémon up to the amount of Energy attached to Jirachi. Remove the
            highest Stage Evolution card from each of those Pokémon and put
            those cards back into your opponent’s hand.
      weaknesses:
        - type: Psychic
          value: ×2
      retreat: '1'
    editions:
      unlimited: c6e39b15-b85c-41d3-9110-153f5b2800c4
      reverse-holo: 0d4e495c-3bf2-4f23-ba0b-c5c6b616d98c
