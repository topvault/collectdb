      hp: '120'
      types:
        - Colorless
      evolveFrom: Chansey
      level: undefined
      stage: Stage1
      abilities:
        - type: Pokemon Power
          name: Softboiled
          effect: >-
            When you play Blissey from your hand, you may flip a coin. If heads,
