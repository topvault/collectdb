        - '181'
      hp: '90'
      types:
        - Lightning
      evolveFrom: Flaaffy
      level: undefined
      stage: Stage2
      attacks:
        - name: Attract Current
          cost:
            - Lightning
          damage: '20'
          effect: >-
            Flip 3 coins. For each heads, you may search your deck for a L
            Energy card and attach it to 1 of your L Pokémon. Shuffle your deck
            afterward.
