            Flip a coin. If heads, this attack does 40 damage plus 20 more
            damage. If tails, this attack does 40 damage and the Defending
            Pokémon is now Paralyzed.
      weaknesses:
        - type: Fighting
          value: ×2
      retreat: undefined
    editions:
      1st-edition: e6457748-2496-45b8-8804-61c773052102
      unlimited: 017fbd62-6193-451e-856c-bc3603b7cda4
