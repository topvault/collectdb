        Normally found near power plants, it can wander away and cause major
        blackouts in cities.
      level: undefined
      stage: Basic
      attacks:
        - name: Thundershock
          cost:
            - Lightning
          damage: '10'
          effect: Flip a coin. If heads, the Defending Pokémon is now Paralyzed.
