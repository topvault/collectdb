          cost:
            - Psychic
          damage: undefined
          effect: >-
            Choose up to 2 Energy cards from your discard pile and attach them
            to Mewtwo.
        - name: Psyburn
          cost:
            - Psychic
            - Psychic
            - Colorless
          damage: '40'
      weaknesses:
        - type: Psychic
          value: ×2
      retreat: undefined
    editions:
      unlimited: a4fdb71a-f09d-42fb-9be2-3e6888e6ca68
