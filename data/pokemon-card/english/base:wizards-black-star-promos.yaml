items:
  pikachu-1:
    name: Pikachu
    variants:
      first-edition-error:
        name: First Edition Error
        description: >-
          This "1st Edition" Pikachu card is the first printed promo card as
          part of Wizards of the Coast's "Black Star" promo set. It is reported
          as a printing error and included very rarely within first edition
          Jungle booster packs.
        id: 49a6d2ae-9721-4f7a-9276-be360a04fb51
        rarityScore: 7
        integrations:
          priceCharting:
            first-edition-error: pikachu-1st-edition-error-1
      corocoro-gray-star:
        name: CoroCoro Comics Gray Star
        rarityScore: 6
        description: >-
          This card was released before the official print with a "grey star"
          set icon. It was included in the Japanese-print magazine Hyper
          CoroCoro Spring Edition in March 1999.

          The card has a unique glossy finish unlike the official print.

          Authenticators distinguish this variant as "1999 P.M. Japanese Promo"
          and "Glossy CoroCoro Comics - Grey Star".
        id: 6f165c19-b81f-4dc4-b934-dccb666e16d3
    details:
      illustrator: Keiji Kinebuchi
      rarity: Common
      category: Pokemon
      dexId:
        - '25'
      hp: '60'
      types:
        - Lightning
      level: undefined
      stage: Basic
      attacks:
        - name: Growl
          cost:
            - Colorless
          damage: undefined
          effect: >-
            If the Defending Pokémon attacks Pikachu during your opponent's next
            turn, any damage done by the attack is reduced by 10 (after applying
            Weakness and Resistance). (Benching either Pokémon ends this
            effect.)
        - name: Thundershock
          cost:
            - Lightning
            - Lightning
          damage: '20'
          effect: Flip a coin. If heads, the Defending Pokémon is now Paralyzed.
      weaknesses:
        - type: Fighting
          value: ×2
      retreat: '1'
    editions:
      unlimited: ecbd2834-e223-4f3e-b2c2-5e3470ee9183
  electabuzz-2:
