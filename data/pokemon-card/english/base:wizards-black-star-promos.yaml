  mewtwo-3:
    name: Mewtwo
    variants:
      vhs-promo:
        name: Kanzenban VHS Promo
        rarityScore: 7
        links:
          'eFour: Kanzenban Mewtwo': "https://www.elitefourum.com/t/mewtwo-strikes-back-u\
            s-version-kanzenban-associated-mewtwo-3-promo-variant/38635"
        description: >-
          This Japanese-printed English version of the US theater promo was
          included in the "Kanzenban" (complete edition) VHS released in Japan
          to coincide with the US theatrical premiere. This was about 1.5 years
          after the original Japanese movie release.

          While identical in design to the American theater promo, it was
          printed using Japanese cardstock and inks. This results in slightly
          different matte texturing and ink coloration. Most notably, the
          cardstock lacks the black layer found in American cards, making it
          visibly lighter and distinguishable when backlit.
        id: 7b74e3f7-cafc-4110-b944-fd584b0f659d
    details:
      illustrator: Ken Sugimori
      rarity: Common
      category: Pokemon
      dexId:
