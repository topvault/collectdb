          cost:
            - Lightning
          damage: undefined
          effect: >-
            Whenever an attack does damage to Electabuzz (after applying
            Weakness and Resistance) during your opponent's next turn, that
            attack only does half the damage to Electabuzz (rounded down to the
            nearest 10). (Any other effects still happen.)
        - name: Quick Attack
          cost:
            - Colorless
            - Colorless
          damage: 10+
          effect: >-
            Flip a coin. If heads, this attack does 10 damage plus 20 more
            damage; if tails, this attack does 10 damage.
