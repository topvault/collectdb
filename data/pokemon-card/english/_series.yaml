base:
  name: Base
  series:
    base-set:
      name: Base Set
      description: >-
        The first Pokemon Trading Card Game set released in English by Wizards of the Coast.
      editions:
        1st-edition:
          name: 1st Edition
          releaseDate: '1999-01-09'
          description: The first english edition of the official Pokémon Trading Card Game.
        shadowless:
          name: Shadowless
          releaseDate: '1999-01-09'
          description: >-
            Coinciding with the 1st Edition print run, shadowless cards were a limited print without the 1st Edition stamp.
            Several updates were then made to the card style, notably adding a shadow, giving this limited print the "shadowless" name.
        unlimited:
          name: Unlimited
          releaseDate: '1999-02-09'
          description: >-
            The standard (called 'unlimited') print run of the Base Set, following the 1st Edition and Shadowless prints.
            A drop shadow was added to the cards' artwork window.
            This was the longest print run, and printed the most cards compared to other runs.
        1999-2000:
          name: 1999-2000 (UK Print)
          releaseDate: '2000-01-09'
          description: A late reprint of the Base set in the UK. This printing includes a unique "1999-2000" copyright.
      integrations:
        priceCharting: 'pokemon-base-set'
        tcgPlayer: 'base-set'
      links:
        Bulbapedia: https://bulbapedia.bulbagarden.net/wiki/Base_Set_(TCG)
      releaseDate: '1999-01-09'
    jungle:
      name: Jungle
      description: >-
        After being a very small set in Japan, the English set started the trend of having both holo and non-holo editions of rare cards, effectively doubling the number of rares in the set.
        Unlike Base Set, it had only two theme decks.
      editions:
        1st-edition: 1st Edition
        unlimited: Unlimited
      integrations:
        priceCharting: 'pokemon-jungle' # G10625
        tcgPlayer: 'jungle'
      links:
        Bulbapedia: https://bulbapedia.bulbagarden.net/wiki/Jungle_(TCG)
      releaseDate: '1999-06-16'
    fossil:
      name: Fossil
      editions:
        1st-edition: 1st Edition
        unlimited: Unlimited
        1999-2000: 1999-2000 (AUS Print)
      integrations:
        priceCharting: 'pokemon-fossil' # G10716
        tcgPlayer: 'fossil'
      links:
        Bulbapedia: https://bulbapedia.bulbagarden.net/wiki/Fossil_(TCG)
      releaseDate: '1999-10-10'
    team-rocket:
      name: Team Rocket
      editions:
        1st-edition: 1st Edition
        unlimited: Unlimited
      integrations:
        priceCharting: 'pokemon-team-rocket' # G10717
        tcgPlayer: 'team-rocket'
      links:
        Bulbapedia: https://bulbapedia.bulbagarden.net/wiki/Team_Rocket_(TCG)
      releaseDate: '2000-04-24'
    wizards-black-star-promos:
      name: Promos (Wizards)
      editions:
        unlimited: Normal
      integrations:
        priceCharting: 'pokemon-promo' # G10740
        tcgPlayer: 'black-star-promos' # ??
      links:
        Bulbapedia: https://bulbapedia.bulbagarden.net/wiki/Wizards_Black_Star_Promos_(TCG)
      releaseDate: '1999-07-01'
    base-set-2:
      name: Base Set 2
      description: >-
        Base Set 2 is a compilation of selected cards from previous sets.
        Wizards of the Coast started a trend of releasing compilation sets.
      integrations:
        priceCharting: 'pokemon-base-set-2' # G10626
        tcgPlayer: 'base-set-2'
      links:
        Bulbapedia: https://bulbapedia.bulbagarden.net/wiki/Base_Set_2_(TCG)
      releaseDate: '2000-02-24'

