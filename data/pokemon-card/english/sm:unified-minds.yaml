          cost:
            - Grass
            - Grass
            - Grass
          damage: '200'
          effect: >-
            If this Pokémon has at least 3 extra Energy attached to it (in
            addition to this attack’s cost), your opponent shuffles all Energy
            from all of their Pokémon into their deck. (You can’t use more than
            1 GX attack in a game.)
