        - '65'
      hp: '80'
      types:
        - Psychic
      evolveFrom: Kadabra
      level: undefined
      stage: Stage2
      abilities:
        - type: Poke-POWER
          name: Damage Swap
          effect: >-
            As often as you like during your turn (before your attack), you may
            move 1 damage counter from 1 of your Pokémon to another as long as
            you don't Knock Out that Pokémon. This power can't be used if
            Alakazam is Asleep, Confused, or Paralyzed.
      attacks:
        - name: Confuse Ray
          cost:
            - Psychic
