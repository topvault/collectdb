items:
  ampharos-1:
    name: Ampharos
    details:
      illustrator: Atsuko Nishida
      rarity: Rare Holo
      category: Pokemon
      dexId:
        - '181'
      hp: '130'
      types:
        - Lightning
      evolveFrom: Flaaffy
      level: undefined
      stage: Stage2
      abilities:
