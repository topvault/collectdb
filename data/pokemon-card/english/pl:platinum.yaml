            Each Pokémon that has any damage counters on it (both yours and your
            opponent's) can't use any Poké-Powers.
      attacks:
        - name: Gigavolt
          cost:
            - Lightning
            - Colorless
          damage: 30+
          effect: >-
            Flip a coin. If heads, this attack does 30 damage plus 30 more
            damage. If tails, the Defending Pokémon is now Paralyzed.
        - name: Reflect Energy
          cost:
            - Lightning
            - Colorless
            - Colorless
          damage: '70'
          effect: >-
            Move an Energy card attached to Ampharos to 1 of your Benched
            Pokémon.
      weaknesses:
        - type: Fighting
          value: '+30'
      resistances:
        - type: Metal
          value: '-20'
      retreat: '2'
