additional:
  tcgi-promos:
    name: TCGi Promos
    description: Special unique cards not publically distributed.
    items:
      ishihara-gx-TGCi01:
        name: Ishihara GX
        releaseDate: '2017-04-01'
        rarityScore: 11
        description: >-
          The card was produced for, and given away to, attendees of a private
          event celebrating Tsunekazu Ishihara's 60th birthday at the sidelines
          of the 2018 World Championships in Nashville, Tennessee in the United
          States. Exact production quantities are unknown, though it has been
          estimated that between 30 and 200 were printed.
        links:
          'Bulbapedia': 'https://bulbapedia.bulbagarden.net/wiki/Ishihara-GX_(TPCi_Promo_1)'
          'Pokeguardian': "https://www.pokeguardian.com/427375_psa-10-ishihara-gx-promo-c\
            ard-sold-on-ebay-auction-for-50-000"
