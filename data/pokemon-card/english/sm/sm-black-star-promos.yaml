        index: 'TGCi01'
      doug-fergison-gx-TGCi01:
        name: Doug Fergison GX
        releaseDate: '2019-08-01'
        rarityScore: 11
        variant:
          name: Jumbo
        description: >-
          The card was produced as a going away gift for Doug Ferguson (who
          recieved 5 copies), who left The Pokémon Company International in
          2019.
        links:
          'Bulbapedia': "https://bulbapedia.bulbagarden.net/wiki/Doug_Ferguson-GX_(TPCi_P\
            romo_1)"
          'Pokeguardian': "https://www.pokeguardian.com/455044_major-discovery-doug-fergu\
            son-gx-spotted-similar-to-the-ishihara-gx-card"
