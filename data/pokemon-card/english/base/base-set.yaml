name: Base Set
description: The first Pokemon Trading Card Game set released in English by
  Wizards of the Coast.
editions:
  1st-edition:
    name: 1st Edition
    releaseDate: '1999-01-09'
    description: The first english edition of the official Pokémon Trading Card Game.
  shadowless:
    name: Shadowless
    releaseDate: '1999-01-09'
    description: Coinciding with the 1st Edition print run, shadowless cards were a
      limited print without the 1st Edition stamp. Several updates were then
      made to the card style, notably adding a shadow, giving this limited print
      the "shadowless" name.
  unlimited:
    name: Unlimited
    releaseDate: '1999-02-09'
    description: The standard (called 'unlimited') print run of the Base Set,
      following the 1st Edition and Shadowless prints. A drop shadow was added
      to the cards' artwork window. This was the longest print run, and printed
      the most cards compared to other runs.
  1999-2000:
    name: 1999-2000 (UK Print)
    releaseDate: '2000-01-09'
    description: A late reprint of the Base set in the UK. This printing includes a
      unique "1999-2000" copyright.
integrations:
  priceCharting: pokemon-base-set
  tcgPlayer: base-set
