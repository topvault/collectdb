  pikachu-58:
    name: Pikachu
    variants:
      shadowless-red-cheeks:
        name: Red Cheeks (Shadowless)
        edition: shadowless
        description: Pikachu with red cheeks
        id: 2a3cfdb3-e71d-42ab-b229-3de02250e951
      1st-edition-red-cheeks:
        name: Red Cheeks (1st Edition)
        edition: 1st-edition
        description: >-
          Pikachu with "Red Cheeks".

          The "Red Cheeks" variant of Pikachu was released in the first (1st)
          and Shadowless versions.

          This version was an intentional release and intentionally less common
          than the yellow cheeks normal variation.
        id: 4d77350c-f7d2-42b1-8293-bf0e0db4c9bd
      e3-red-cheeks:
        name: E3-stamp (Red Cheeks)
        description: >-
          Pikachu with E3 stamp with "Red Cheeks".

          The E3 Pikachu promotional cards were given away at the E3 (Electronic
          Entertainment Expo) events in Los Angeles in May 1999. It is unclear
          if the Red Cheeks E3 variant was included as a limited run
          intentionally, or if the change-over from red to yellow in the normal
          shadowless set affected the E3 promo prints unintentionally.
        rarityScore: 7
        id: eae67021-09d2-4abf-b6c2-40e5559f37e6
      poketour-1999:
        name: Pokémon Tour 1999
        description: >-
          Pikachu with Pokémon Tour 1999 stamp.

          This card was given out in the swag bag as part of the TCG promotional
          event in Sydney.
        rarityScore: 6
        id: ad06df44-fe75-4f0a-913f-c6ff6b8d47d7
      e3:
        name: E3-stamp
        description: >-
          Pikachu with E3 stamp.

          The "Yellow Cheeks" E3 stamp was distributed via Nintendo Power as is
          much more common compared to the "Red Cheeks" variant.
        id: 1130413b-a3d0-45e9-bb36-d11519f7080e
      1st-edition-ghost-stamp:
        name: Ghost Stamp
        edition: 1st-edition
        description: Pikachu with ghost stamp.
        id: a5a46197-f5e9-4642-a8e4-03accc9f29fe
      jumbo:
        name: Jumbo
        description: Jumbo version provided in Top Deck Magazine (February 2000).
        id: b0ec67dd-bad9-4fd6-9e92-326909b6f4a0
      best-song:
        name: Best Song Promo
        edition: shadowless
        links:
          'Bulbapedia (Best Song)': "https://bulbapedia.bulbagarden.net/wiki/Pok%C3%A9mon\
            _Song_Best_Collection"
        description: >-
          Base Set Pikachu with "yellow cheeks" from the shadowless edition,
          printed with Japanese card stock, with a glossy back and lighter
          yellow ink. Hard to distinguish from to the Wizard of the Coast prints
          unless viewed up close.

          This variant is often incorrectly unmarked by authenticators.
        id: 54d4e7db-1318-4bff-9d7f-58a1b0c77b98
