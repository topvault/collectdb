items:
  ampharos-1:
    name: Ampharos
    variants:
      holo:
        name: Holo
        description: Holo.
        id: 5e32b886-52fb-4dbb-bbb2-3bb90edcc71e
    details:
      illustrator: Kouki Saitou
      rarity: Rare
      category: Pokemon
      dexId:
        - '181'
      hp: '130'
      types:
        - Lightning
      evolveFrom: Flaaffy
      description: >-
        The tip of its tail shines brightly. In the olden days, people sent
        signals using the tail’s light.
      level: undefined
      stage: Stage2
      abilities:
        - type: Poke-BODY
          name: Jamming
          effect: >-
            After your opponent plays a Supporter card from his or her hand, put
            1 damage counter on each of your opponent’s Pokémon. You can’t use
            more than 1 Jamming Poké-Body each turn.
      attacks:
        - name: Cluster Bolt
          cost:
            - Lightning
            - Colorless
            - Colorless
          damage: '70'
          effect: >-
            You may discard all Lightning Energy attached to Ampharos. If you
            do, this attack does 20 damage to each of your opponent’s Benched
            Pokémon that has any Energy cards attached to it. (Don’t apply
            Weakness and Resistance for Benched Pokémon.)
      weaknesses:
        - type: Fighting
          value: '+30'
      resistances:
        - type: Metal
          value: '-20'
      retreat: '3'
    editions:
      unlimited: db93f449-8f6f-49f6-9c73-4d6e0bde0b93
    integrations:
      pokeData: '43664'
      tcgPlayer: '83542'
