        links:
          'Pichu.blog': 'https://pichu.blog/english-expedition-base-set'
        description: >-
          These cards have a hole punched in the top center of the card and a
          matte finish on the back. They were used in retail stores to test the
          new e-Reader. There is an alternate version of this card with the hole
          punched and a glossy back.

          Note that these hole-punched cards are different from the E3 test
          print cards.
        rarityScore: 6
        id: cbd74c6c-dc6f-4221-b559-e65570253d93
      japanese-back:
        name: E3 Convention 2002
        links:
          'Pichu.blog': 'https://pichu.blog/english-expedition-base-set'
        description: >-
          These cards were used at E3 in 2002 to demonstrate the new e-Reader,
          they feature a Japanses-style card back. They were english translation
          versions of the Japanese cards and thus contain many formatting
          differences.

          The cards were not permitted to leave E3 and thus very few are
          available.
        rarityScore: 6
