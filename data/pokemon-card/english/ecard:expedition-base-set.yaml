items:
  alakazam-1:
    name: Alakazam
    variants:
      box-topper:
        name: Box Topper (Jumbo)
        description: Box Topper (Jumbo).
        edition: reverse-holo
        id: 8b8ea521-7419-49a7-8f53-74f1893f913a
    details:
      illustrator: Hajime Kusajima
      rarity: Rare
      category: Pokemon
      dexId:
        - '65'
      hp: '100'
      types:
        - Psychic
      evolveFrom: Kadabra
      level: undefined
      stage: Stage2
      abilities:
        - type: Poke-POWER
          name: Psymimic
          effect: >-
            Once during your turn, instead of Alakazam's normal attack, you may
            choose 1 of your opponent's Pokémon's attack. Alakazam copies that
            attack including its Energy costs and anything else required in
            order to use that attack, such as discarding Energy cards. (No
            matter what type that Pokémon is, Alakazam's type is still Psychic.)
            This power can't be used if Alakazam is affected by a Special
            Condition.
      attacks:
        - name: Syncroblast
          cost:
            - Psychic
            - Colorless
            - Colorless
          damage: '80'
          effect: >-
            If Alakazam and the Defending Pokémon don't have the same number of
            Energy cards on them, this attack's base damage is 20 instead of 80.
      weaknesses:
        - type: Psychic
          value: ×2
      retreat: undefined
    editions:
      unlimited: 6f679988-76ab-490b-b14f-871611b3f809
      reverse-holo: 181e4f1c-00b0-48c1-ba84-dd445d9ece66
